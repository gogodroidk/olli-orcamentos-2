<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OLLI — do orçamento ao recibo, sem planilha">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2547"></stop>
      <stop offset="1" stop-color="#0B6FCE"></stop>
    </linearGradient>
    <linearGradient id="olliLogoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3FD8EA"></stop>
      <stop offset="1" stop-color="#0B6FCE"></stop>
    </linearGradient>
    <linearGradient id="ogWordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"></stop>
      <stop offset="1" stop-color="#3FD8EA"></stop>
    </linearGradient>
    <radialGradient id="ogGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3FD8EA" stop-opacity="0.45"></stop>
      <stop offset="1" stop-color="#3FD8EA" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"></rect>
  <ellipse cx="250" cy="315" rx="430" ry="430" fill="url(#ogGlow)"></ellipse>
  <ellipse cx="1050" cy="120" rx="360" ry="360" fill="url(#ogGlow)" opacity="0.5"></ellipse>

  <!-- Logo-mascote OLLI (paths de OlliLogo.astro, escalados 5x) -->
  <g transform="translate(96 150) scale(5)">
    <path d="M22 49 L12 59.5 L30 50 Z" fill="url(#olliLogoGrad)"></path>
    <rect x="9" y="8" width="46" height="44" rx="14.5" fill="url(#olliLogoGrad)"></rect>
    <rect x="13" y="11.5" width="38" height="15" rx="9" fill="#ffffff" fill-opacity="0.1"></rect>
    <rect x="20" y="18.5" width="8.5" height="11" rx="4.2" fill="#7FE9F5"></rect>
    <rect x="35.5" y="18.5" width="8.5" height="11" rx="4.2" fill="#7FE9F5"></rect>
    <path d="M19 41 l6.6 6.9 l16 -15" fill="none" stroke="#EAFEFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></path>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="470" y="330" font-size="180" font-weight="800" letter-spacing="-6" fill="url(#ogWordmark)">OLLI</text>
    <text x="476" y="410" font-size="42" font-weight="500" fill="#C7D6EA">Do orçamento ao recibo, sem planilha.</text>
    <text x="476" y="470" font-size="30" font-weight="600" letter-spacing="1" fill="#3FD8EA" fill-opacity="0.9">olliorcamentos.online</text>
  </g>
</svg>

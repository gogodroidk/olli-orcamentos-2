name = "olli-diagnostico"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Cache do diagnóstico (opcional, recomendado) — namespace já criado na sua conta.
# Se você fizer deploy pelo painel, vincule manualmente: CACHE → olli-diagnostico-cache.
[[kv_namespaces]]
binding = "CACHE"
id = "193f53aa847447598e3f5b6b716ebdad"

# Variável pública (não-secreta): pode trocar o modelo aqui.
[vars]
GEMINI_MODEL = "gemini-3.5-flash"

# SECRETS (NÃO commitar) — defina com `wrangler secret put <NOME>`:
#   GEMINI_API_KEY        ← chave do Google AI Studio (o que você vai usar)
# Alternativa (se um dia trocar pra Claude):
#   ANTHROPIC_API_KEY     (+ opcional ANTHROPIC_MODEL em [vars])

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>OLLI Orçamentos — Do orçamento ao recibo, sem planilha</title>
    <meta
      name="description"
      content="OLLI é o sistema para quem presta serviço em campo: orçamento que o cliente aprova online, ordem de serviço com fotos e assinatura, agenda, equipe e financeiro num só lugar. Comece grátis."
    />
    <meta name="theme-color" content="#0A2547" />
    <link rel="canonical" href="https://olliorcamentos.online/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OLLI Orçamentos" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://olliorcamentos.online/" />
    <meta property="og:title" content="OLLI Orçamentos — Do orçamento ao recibo, sem planilha" />
    <meta
      property="og:description"
      content="Orçamento que o cliente aprova online, ordem de serviço no campo, agenda, equipe e financeiro num só lugar. Comece grátis, sem cartão."
    />
    <meta property="og:image" content="https://olliorcamentos.online/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OLLI Orçamentos — Do orçamento ao recibo, sem planilha" />
    <meta
      name="twitter:description"
      content="Orçamento que o cliente aprova online, ordem de serviço no campo, agenda, equipe e financeiro num só lugar. Comece grátis, sem cartão."
    />
    <meta name="twitter:image" content="https://olliorcamentos.online/og-image.png" />

    <!-- JSON-LD: SoftwareApplication + Organization + FAQPage (perguntas iguais às da seção FAQ da landing) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "OLLI Orçamentos",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web, Android, iOS",
            "url": "https://olliorcamentos.online/",
            "description": "Sistema de orçamentos, ordens de serviço, agenda, equipe e financeiro para prestadores de serviço em campo.",
            "offers": [
              { "@type": "Offer", "name": "Grátis", "price": "0", "priceCurrency": "BRL", "url": "https://olliorcamentos.online/planos" },
              { "@type": "Offer", "name": "Pro", "price": "39", "priceCurrency": "BRL", "url": "https://olliorcamentos.online/planos" },
              { "@type": "Offer", "name": "Empresa", "price": "99", "priceCurrency": "BRL", "url": "https://olliorcamentos.online/planos" }
            ]
          },
          {
            "@type": "Organization",
            "name": "OLLI Orçamentos",
            "url": "https://olliorcamentos.online/",
            "logo": "https://olliorcamentos.online/og-image.png",
            "contactPoint": {
              "@type": "ContactPoint",
              "contactType": "customer support",
              "areaServed": "BR",
              "availableLanguage": "Portuguese"
            }
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "O OLLI é pago?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Não. O plano Grátis já traz orçamentos, recibos, clientes e agenda ilimitados, sem cartão de crédito e sem prazo de teste. Os planos Pro e Empresa liberam relatórios, metas e outros recursos avançados, mas o essencial do dia a dia é gratuito para sempre."
                }
              },
              {
                "@type": "Question",
                "name": "Como o cliente aprova o orçamento?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Você envia um link pelo WhatsApp ou e-mail. O cliente abre no celular dele, revisa os itens e aprova com um toque, sem precisar instalar nada. Assim que ele aprova, você já pode emitir o recibo."
                }
              },
              {
                "@type": "Question",
                "name": "O OLLI funciona sem internet?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sim. Orçamentos, recibos, clientes, agenda e o diagnóstico por código de erro funcionam offline, salvos no aparelho. Quando a internet volta, tudo sincroniza automaticamente com a nuvem."
                }
              },
              {
                "@type": "Question",
                "name": "Dá para usar no computador e no celular ao mesmo tempo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sim. O OLLI é o mesmo sistema no navegador do computador e no aplicativo do celular, com os dados sincronizados na nuvem entre os dois."
                }
              },
              {
                "@type": "Question",
                "name": "Como funciona a ordem de serviço no campo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Cada visita técnica vira uma ordem de serviço com fotos, assinatura do cliente e histórico, sem papel. A gestão acompanha o andamento de cada técnico em tempo real."
                }
              },
              {
                "@type": "Question",
                "name": "Posso cancelar minha assinatura quando quiser?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sim. Os planos Pro e Empresa são assinaturas mensais ou anuais que você cancela quando quiser direto pelo app, em 'Gerenciar assinatura'. Não há fidelidade."
                }
              },
              {
                "@type": "Question",
                "name": "O plano Empresa serve para equipes com vários técnicos?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "O plano Empresa já traz tudo do Pro e suporte prioritário. Os recursos de equipe — vários técnicos com permissões por papel, mapa da equipe ao vivo e painel de gestão — ainda estão chegando (em breve)."
                }
              },
              {
                "@type": "Question",
                "name": "Meus dados e os dos meus clientes estão seguros?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sim. Os dados ficam isolados por empresa (cada conta só enxerga os próprios dados) e têm backup automático na nuvem, seguindo a LGPD."
                }
              }
            ]
          }
        ]
      }
    </script>

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      Você precisa ativar o JavaScript para usar o OLLI Orçamentos.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
